<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Online Resmi</title>
    <style>
        /* Gaya Tampilan Web */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5;
            /* Mencegah seleksi teks global */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        header {
            background-color: #d93025;
            color: white;
            padding: 15px;
            text-align: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .timer-box {
            font-size: 24px;
            font-weight: bold;
            background: white;
            color: #d93025;
            padding: 5px 15px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 5px;
        }
        .container {
            width: 100%;
            max-width: 850px;
            margin: 140px auto 40px auto;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: relative; /* Penting untuk overlay */
        }
        iframe {
            width: 100%;
            border: none;
            min-height: 800px;
        }
        
        /* Tampilan ketika waktu habis */
        #block-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            color: black;
            z-index: 9999;
            text-align: center;
            padding-top: 20%;
            font-size: 28px;
            font-weight: bold;
        }

        /* Overlay transparan di atas iframe untuk memblokir interaksi tak diinginkan */
        #iframe-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0); /* Transparan penuh */
            z-index: 1; /* Di atas iframe */
            display: none; /* Disembunyikan saat kuis berlangsung */
        }
    </style>
</head>
<body>

    <header>
        <div style="font-size: 18px; font-weight: bold;">UJIAN ONLINE - WAKTU TERBATAS</div>
        <div class="timer-box" id="countdown">30:00</div>
        <div style="font-size: 12px; margin-top: 3px;">Peringatan: Dilarang menyalin (Copy) pertanyaan atau membuka tab baru!</div>
    </header>

    <div class="container" id="quiz-area">
        <!-- Overlay transparan -->
        <div id="iframe-overlay"></div>
        <!-- SILAKAN GANTI URL DI BAWAH INI DENGAN LINK GOOGLE FORM ANDA -->
        
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSe2uR9vtSw24X-Y4EyosBC3R-zzGoaJtgc_kGBwoAlLpCOAEg/viewform?embedded=true" width="640" height="4173" frameborder="0" marginheight="0" marginwidth="0">Memuat…</iframe>
    </div>

    <div id="block-screen">
        <span style="color: red; font-size: 50px;">⚠️ WAKTU HABIS!</span><br><br>
        Waktu pengerjaan 30 menit telah selesai.<br>
        Jawaban Anda telah dikirim secara otomatis.
    </div>

    <script>
        let waktuSisa = 30 * 60;
        const timerElement = document.getElementById('countdown');
        const quizArea = document.getElementById('quiz-area');
        const blockScreen = document.getElementById('block-screen');
        const quizIframe = document.getElementById('quiz-iframe');
        const iframeOverlay = document.getElementById('iframe-overlay');

        const hitungMundur = setInterval(function() {
            let menit = Math.floor(waktuSisa / 60);
            let detik = waktuSisa % 60;
            menit = menit < 10 ? '0' + menit : menit;
            detik = detik < 10 ? '0' + detik : detik;
            timerElement.innerHTML = menit + ":" + detik;

            if (waktuSisa <= 60) {
                timerElement.style.backgroundColor = '#d93025';
                timerElement.style.color = 'white';
            }

            if (waktuSisa <= 0) {
                clearInterval(hitungMundur);
                
                // Beri waktu sedikit agar siswa bisa klik tombol 'Kirim' terakhir kali
                setTimeout(() => {
                    quizArea.style.display = 'none';
                    blockScreen.style.display = 'block';
                }, 1000); 
            }
            waktuSisa--;
        }, 1000);

        // --- PROTEKSI LEBIH AGRESIF ---

        // Mematikan Klik Kanan di halaman luar
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            alert("Maaf, Klik Kanan dilarang selama ujian!");
        });

        // Mematikan shortcut Keyboard (Ctrl+C, Ctrl+V, dll.) di halaman luar
        document.onkeydown = function(e) {
            if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 86 || e.keyCode === 85 || e.keyCode === 83 || e.keyCode === 73)) {
                alert("Pintasan keyboard ini dinonaktifkan!");
                return false;
            } else {
                return true;
            }
        };

        // Mencegah interaksi langsung dengan iframe saat dimuat
        quizIframe.onload = function() {
            // Tampilkan overlay transparan di atas iframe untuk memblokir interaksi
            iframeOverlay.style.display = 'block'; 
            
            // Atur agar overlay ini tidak benar-benar menghalangi klik ke Google Form
            iframeOverlay.style.pointerEvents = 'none'; // Mengabaikan klik agar diteruskan ke iframe di bawahnya

            // Nonaktifkan klik kanan dan pintasan di dalam iframe (TIDAK BERJALAN DI SEMUA BROWSER)
            try {
                const iframeDocument = quizIframe.contentDocument || quizIframe.contentWindow.document;
                iframeDocument.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                });
                iframeDocument.onkeydown = function(e) {
                    if (e.ctrlKey && (e.keyCode === 67 || e.keyCode === 86)) {
                        return false;
                    }
                };
            } catch (error) {
                // Seringkali gagal karena kebijakan keamanan "cross-origin"
                console.log("Proteksi dalam iframe terbatas oleh kebijakan keamanan browser.");
            }
        };

        // Deteksi jika siswa berpindah tab (opsional - Anda bisa aktifkan)
        /*
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                alert("DILARANG BERPINDAH TAB! Pelanggaran dicatat.");
            }
        });
        */
    </script>
</body>
</html>
